name: GLM Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  glm-review:
    # Gate de segurança: só o owner dispara e o PR precisa vir do próprio
    # repositório (não fork). Evita consumo da API key e prompt injection
    # via código malicioso em PR externo.
    if: |
      github.actor == 'everton-dgn' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run GLM Code Review
        id: glm-review
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
        env:
          # Z.AI GLM Coding Plan — endpoint Anthropic-compatible.
          # Doc: https://docs.z.ai/scenario-example/develop-tools/claude
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ZAI_API_KEY }}
          ANTHROPIC_API_KEY: ""
          DISABLE_COMPACT: "1"
          CLAUDE_CODE_MAX_CONTEXT_TOKENS: "1000000"
          API_TIMEOUT_MS: "3000000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          ANTHROPIC_DEFAULT_OPUS_MODEL: glm-5.2
          ANTHROPIC_DEFAULT_SONNET_MODEL: glm-5.2
          ANTHROPIC_DEFAULT_HAIKU_MODEL: glm-5.2
          ANTHROPIC_MODEL: glm-5.2
          ANTHROPIC_SMALL_FAST_MODEL: glm-5.2
          CLAUDE_CODE_SUBAGENT_MODEL: glm-5.2
        with:
          claude_args: |
            --model "glm-5.2"
          prompt: |
            Use a skill em .claude/skills/skill-code-review/SKILL.md para revisar
            o PR #${{ github.event.pull_request.number }} do repositório ${{ github.repository }}.
            Siga todas as regras definidas no CLAUDE.md do projeto.
            Comente com o prefixo `[GLM]` no início da revisão para diferenciar dos demais revisores.
          track_progress: true
