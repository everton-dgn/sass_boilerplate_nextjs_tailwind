name: Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
  LEFTHOOK: 0

on:
  push:
    branches:
      - main

jobs:
  Workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      #  config_actions:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # add pnpm
      - name: Config pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      #  setup_node:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      #  install_dependencies:
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      #  typecheck:
      - name: Run Typescript Check
        run: pnpm typecheck

      #  lint:
      - name: Run Lint
        run: pnpm biome:ci

      #  test_ci:
      - name: Run Tests
        run: pnpm test:ci --reporter=verbose

      #  build_deploy:
      - name: Pull Vercel Environment Information
        run: pnpm dlx --allow-build=esbuild vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: pnpm dlx --allow-build=esbuild vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: pnpm dlx --allow-build=esbuild vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
